name: Android CI

on:
  workflow_dispatch: 
  push:
    branches: [ "main", "master", "feature/*", "experimental", "beta" ]

jobs:
  build:
    permissions: write-all
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      MESSAGE_ID: ${{ secrets.MESSAGE_ID }}

    steps:
      - name: Run actions/checkout@v6
        uses: actions/checkout@v6

      - name: Get short SHA
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Telegram Notification (Start)
        run: |
          MESSAGE="<b>📦 Whatsapp Toolkit Build</b>%0A%0A"
          MESSAGE+="<b>SHA:</b> <code>${{ env.SHORT_SHA }}</code>%0A"
          MESSAGE+="<b>Author:</b> ${{ github.actor }}%0A"
          MESSAGE+="<b>Status:</b> 🚀 Starting build...%0A"
          
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ env.MESSAGE_ID }}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=HTML")
          
          MSG_ID=$(echo $RESPONSE | jq '.result.message_id')
          echo "MSG_ID=$MSG_ID" >> $GITHUB_ENV

      - name: set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Update Telegram (Java Setup)
        run: |
          MESSAGE="<b>📦 Whatsapp Toolkit Build</b>%0A%0A"
          MESSAGE+="<b>SHA:</b> <code>${{ env.SHORT_SHA }}</code>%0A"
          MESSAGE+="<b>Author:</b> ${{ github.actor }}%0A"
          MESSAGE+="<b>Status:</b> ☕ Java Setup Ready%0A"
          
          if [ ! -z "${{ env.MSG_ID }}" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/editMessageText" \
              -d "chat_id=${{ env.MESSAGE_ID }}" \
              -d "message_id=${{ env.MSG_ID }}" \
              -d "text=$MESSAGE" \
              -d "parse_mode=HTML"
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Update Telegram (Gradle Setup)
        run: |
          MESSAGE="<b>📦 Whatsapp Toolkit Build</b>%0A%0A"
          MESSAGE+="<b>SHA:</b> <code>${{ env.SHORT_SHA }}</code>%0A"
          MESSAGE+="<b>Author:</b> ${{ github.actor }}%0A"
          MESSAGE+="<b>Status:</b> 🐘 Gradle Ready%0A"
          
          if [ ! -z "${{ env.MSG_ID }}" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/editMessageText" \
              -d "chat_id=${{ env.MESSAGE_ID }}" \
              -d "message_id=${{ env.MSG_ID }}" \
              -d "text=$MESSAGE" \
              -d "parse_mode=HTML"
          fi

      - name: Write key
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.RELEASE_KEY }}" | base64 -d > app/my-release-key.keystore
          echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >> $GITHUB_ENV
          echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build all flavor variants
        run: |
          MESSAGE="<b>📦 Whatsapp Toolkit Build</b>%0A%0A"
          MESSAGE+="<b>SHA:</b> <code>${{ env.SHORT_SHA }}</code>%0A"
          MESSAGE+="<b>Author:</b> ${{ github.actor }}%0A"
          MESSAGE+="<b>Status:</b> 🛠️ Building APKs...%0A"
          
          if [ ! -z "${{ env.MSG_ID }}" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/editMessageText" \
              -d "chat_id=${{ env.MESSAGE_ID }}" \
              -d "message_id=${{ env.MSG_ID }}" \
              -d "text=$MESSAGE" \
              -d "parse_mode=HTML"
          fi
          
          ./gradlew assembleWhatsappDebug assembleBusinessDebug -Pminify=true --parallel --configuration-cache --no-daemon 2>&1 | tee log.txt
          echo "Listing built APKs:"
          find app/build/outputs/apk -name "*.apk"

      - name: Upload WhatsApp flavor artifacts
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: whatsapp-debug-app-${{ env.SHORT_SHA }}
          path: app/build/outputs/apk/whatsapp/debug/*.apk

      - name: Upload Business flavor artifacts
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: business-debug-app-${{ env.SHORT_SHA }}
          path: app/build/outputs/apk/business/debug/*.apk

      - name: Upload to GitHub release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ env.GH_TOKEN }}
          name: Whatsapp Toolkit ${{ env.SHORT_SHA }}
          body_path: changelog.txt
          files: |
            app/build/outputs/apk/whatsapp/debug/*.apk
            app/build/outputs/apk/business/debug/*.apk
          tag_name: debug-${{ env.SHORT_SHA }}
          overwrite_files: true

      - name: Read changelog
        if: always()
        run: |
          if [ -f changelog.txt ]; then
            echo "CHANGELOG<<EOF" >> $GITHUB_ENV
            cat changelog.txt >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Post to Telegram (Success/Failure)
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            STATUS="✅ Success"
            MESSAGE="<b>📦 Whatsapp Toolkit Build</b>%0A%0A"
            MESSAGE+="<b>SHA:</b> <code>${{ env.SHORT_SHA }}</code>%0A"
            MESSAGE+="<b>Author:</b> ${{ github.actor }}%0A"
            MESSAGE+="<b>Status:</b> $STATUS%0A%0A"
            MESSAGE+="${{ env.CHANGELOG }}"
          else
            STATUS="❌ Failed"
            MESSAGE="<b>📦 Whatsapp Toolkit Build</b>%0A%0A"
            MESSAGE+="<b>SHA:</b> <code>${{ env.SHORT_SHA }}</code>%0A"
            MESSAGE+="<b>Author:</b> ${{ github.actor }}%0A"
            MESSAGE+="<b>Status:</b> $STATUS"
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/editMessageText" \
            -d "chat_id=${{ env.MESSAGE_ID }}" \
            -d "message_id=${{ env.MSG_ID }}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true"
          
          if [ "${{ job.status }}" == "success" ]; then
            # Upload WhatsApp APK
            WPP_APK=$(find app/build/outputs/apk/whatsapp/debug -name "*.apk" | head -n 1)
            curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendDocument" \
              -F "chat_id=${{ env.MESSAGE_ID }}" \
              -F "document=@$WPP_APK" \
              -F "caption=WhatsApp Flavor - ${{ env.SHORT_SHA }}"
              
            # Upload Business APK
            BUS_APK=$(find app/build/outputs/apk/business/debug -name "*.apk" | head -n 1)
            curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendDocument" \
              -F "chat_id=${{ env.MESSAGE_ID }}" \
              -F "document=@$BUS_APK" \
              -F "caption=Business Flavor - ${{ env.SHORT_SHA }}"
          else
            # Upload log.txt if exists
            if [ -f log.txt ]; then
              curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendDocument" \
                -F "chat_id=${{ env.MESSAGE_ID }}" \
                -F "document=@log.txt" \
                -F "caption=Build Log - ${{ env.SHORT_SHA }}"
            fi
          fi
