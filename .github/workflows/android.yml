name: Android CI

on:
  workflow_dispatch: 
  push:
    branches: [ "main", "master", "feature/*", "experimental" ]

jobs:
  build:
    permissions: write-all
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      MESSAGE_ID: ${{ secrets.MESSAGE_ID }}
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && !contains(github.event.head_commit.message, 'Merge')
    steps:
      - uses: actions/checkout@v6
      - name: set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Write key
        if: github.event_name != 'pull_request'
        env:
          KEY_STORE: ${{ secrets.KEY_STORE }}
        run: |
          if [ ! -z "$KEY_STORE" ]; then
          echo androidStorePassword='${{ secrets.KEY_STORE_PASSWORD }}' >> gradle.properties
          echo androidKeyAlias='${{ secrets.ALIAS }}' >> gradle.properties
          echo androidKeyPassword='${{ secrets.KEY_PASSWORD }}' >> gradle.properties
          echo androidStoreFile='key.jks' >> gradle.properties
          echo "$KEY_STORE" | base64 --decode > key.jks
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build all flavor variants
        run: |
          ./gradlew assembleWhatsappDebug assembleBusinessDebug -Pminify=true --parallel --configuration-cache --no-daemon

      - name: Get short SHA
        run: echo "SHORT_SHA=`echo ${GITHUB_SHA} | cut -c1-7`" >> $GITHUB_ENV

      - name: Upload WhatsApp flavor artifacts
        uses: actions/upload-artifact@v5
        with:
          name: whatsapp-debug-app-${{ env.SHORT_SHA }}
          path: app/build/outputs/apk/whatsapp/debug/app-whatsapp-debug.apk

      - name: Upload Business flavor artifacts
        uses: actions/upload-artifact@v5
        with:
          name: business-debug-app-${{ env.SHORT_SHA }}
          path: app/build/outputs/apk/business/debug/app-business-debug.apk

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ env.GH_TOKEN }}
          name: Whatsapp Toolkit ${{ env.SHORT_SHA }}
          body_path: changelog.txt
          files: |
            app/build/outputs/apk/whatsapp/debug/app-whatsapp-debug.apk
            app/build/outputs/apk/business/debug/app-business-debug.apk
          tag_name: debug-${{ env.SHORT_SHA }}

      - name: Read changelog
        if: ${{ success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.ref_type != 'tag' && env.TELEGRAM_BOT_TOKEN != '' }}
        id: changelog
        run: |
          CHANGELOG=$(cat changelog.txt)
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post to Telegram
        if: ${{ success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.ref_type != 'tag' && env.TELEGRAM_BOT_TOKEN != '' }}
        run: |
          MESSAGE="<b>📦 Whatsapp Toolkit Build</b>%0A%0A"
          MESSAGE+="<b>SHA:</b> <code>${{ env.SHORT_SHA }}</code>%0A"
          MESSAGE+="<b>Author:</b> ${{ github.actor }}%0A"
          MESSAGE+="<b>Commit:</b> ${{ github.event.head_commit.message }}%0A%0A"
          MESSAGE+="<b>Changelog:</b>%0A${{ steps.changelog.outputs.content }}%0A%0A"
          MESSAGE+="<b>Release:</b> <a href='https://github.com/${{ github.repository }}/releases/tag/debug-${{ env.SHORT_SHA }}'>View on GitHub</a>"
          
          # Send message
          curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ env.MESSAGE_ID }}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true"
            
          # Upload WhatsApp APK
          curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendDocument" \
            -F "chat_id=${{ env.MESSAGE_ID }}" \
            -F "document=@app/build/outputs/apk/whatsapp/debug/app-whatsapp-debug.apk" \
            -F "caption=WhatsApp Flavor - ${{ env.SHORT_SHA }}"
            
          # Upload Business APK
          curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendDocument" \
            -F "chat_id=${{ env.MESSAGE_ID }}" \
            -F "document=@app/build/outputs/apk/business/debug/app-business-debug.apk" \
            -F "caption=Business Flavor - ${{ env.SHORT_SHA }}"
